name: ci-netlify-build

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Test environment variables (non-sensitive)
  NEXT_PUBLIC_SUPABASE_URL: https://test-project.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key-for-testing-purposes-only
  LLM_PROVIDER: anthropic
  LLM_MODEL: claude-sonnet-4-20250514

jobs:
  # ============================================
  # JOB 1: Lint, Type Check, Security Scan
  # ============================================
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Secret scan
        run: npm run scan:secrets

      - name: TypeScript check
        run: npx -y tsc -p tsconfig.json --noEmit

      - name: ESLint strict
        run: npm run lint:strict

  # ============================================
  # JOB 2: Unit Tests with Coverage
  # ============================================
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage
        env:
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key-for-testing
          LLM_API_KEY: test-llm-api-key-for-testing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 14

  # ============================================
  # JOB 3: Integration Tests
  # ============================================
  integration-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key-for-testing
          LLM_API_KEY: test-llm-api-key-for-testing

  # ============================================
  # JOB 4: Build (parallel with tests)
  # ============================================
  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Next.js build (CI)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ============================================
  # JOB 5: E2E Tests (requires build)
  # ============================================
  e2e-tests:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3001
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key-for-testing
          LLM_API_KEY: test-llm-api-key-for-testing

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7

  # ============================================
  # JOB 6: Final Gate (all tests must pass)
  # ============================================
  ci-success:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, build]
    if: always()
    steps:
      - name: Check all jobs passed
        env:
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
          E2E_RESULT: ${{ needs.e2e-tests.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [[ "$UNIT_RESULT" != "success" ]] || \
             [[ "$INTEGRATION_RESULT" != "success" ]] || \
             [[ "$E2E_RESULT" != "success" ]] || \
             [[ "$BUILD_RESULT" != "success" ]]; then
            echo "One or more jobs failed"
            echo "Unit tests: $UNIT_RESULT"
            echo "Integration tests: $INTEGRATION_RESULT"
            echo "E2E tests: $E2E_RESULT"
            echo "Build: $BUILD_RESULT"
            exit 1
          fi
          echo "All CI checks passed!"
